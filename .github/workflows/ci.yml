name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x
      - run: dotnet restore StartupConnect.slnx
      - run: dotnet build StartupConnect.slnx --configuration Release --no-restore
      - run: dotnet test StartupConnect.slnx --configuration Release --no-build

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - run: npm audit --audit-level=moderate
      - run: npm run lint
      - run: npm run build

  containers:
    runs-on: ubuntu-latest
    needs: [backend, frontend, operations]
    steps:
      - uses: actions/checkout@v4
      - run: docker build -f src/Api/Dockerfile -t startupconnect-api:ci .
      - run: docker build -f frontend/Dockerfile --build-arg NEXT_PUBLIC_API_BASE_URL=http://localhost:8080/api/v1 -t startupconnect-frontend:ci .

  operations:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Validate production Compose
        run: docker compose --env-file .env.production.example -f docker-compose.production.yml config --quiet
      - name: Validate Caddy configuration
        run: |
          docker run --rm \
            -e APP_DOMAIN=app.example.com \
            -e API_DOMAIN=api.example.com \
            -e ACME_EMAIL=admin@example.com \
            -v "$PWD/deploy/Caddyfile:/etc/caddy/Caddyfile:ro" \
            caddy:2.10-alpine caddy validate --config /etc/caddy/Caddyfile --adapter caddyfile
      - name: Parse PowerShell operations scripts
        shell: pwsh
        run: |
          Get-ChildItem ./tools/*.ps1 | ForEach-Object {
            [void][scriptblock]::Create((Get-Content $_.FullName -Raw))
            Write-Host "Validated $($_.Name)"
          }
      - name: Parse Bash operations scripts
        run: bash -n ./tools/*.sh

  e2e:
    runs-on: ubuntu-latest
    needs: [backend, frontend]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
        working-directory: frontend
      - run: npx playwright install --with-deps chromium
        working-directory: frontend
      - run: docker compose up -d --build postgres api
      - name: Wait for API
        run: |
          for attempt in {1..60}; do
            curl --fail http://localhost:8080/api/v1/health/ready && exit 0
            sleep 2
          done
          docker compose logs api
          exit 1
      - run: npm run test:e2e
        working-directory: frontend
        env:
          E2E_API_BASE_URL: http://localhost:8080/api/v1
          PLAYWRIGHT_USE_BUNDLED_CHROMIUM: "true"
      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report
          path: frontend/playwright-report
          retention-days: 7
      - name: Stop E2E stack
        if: always()
        run: docker compose down -v
